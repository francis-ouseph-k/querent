# Confidence Calibration Rules
# ─────────────────────────────────────────────────────────────────────────────
confidence_calibration:
  ilike_on_ids:
    regex: '\\b\\w+_id\\s+(i)?like\\s+'
    penalty: 0.15
  excessive_nesting:
    max_select_count: 3
    penalty: 0.10


